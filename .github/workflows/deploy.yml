name: Redirect to docs.mikuas.top

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://docs.mikuas.top">
            <link rel="canonical" href="https://docs.mikuas.top">
            <title>正在跳转...</title>
          </head>
          <body>
            <script>location.href = "https://docs.mikuas.top"</script>
            <p>正在跳转到 <a href="https://docs.mikuas.top">docs.mikuas.top</a></p>
          </body>
          </html>
          EOF
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
